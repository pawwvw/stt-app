name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

# Разрешаем job'у создавать релиз (загружать ассеты по тегу)
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — universal (Intel + Apple Silicon)
          - platform: macos-latest
            target: universal-apple-darwin
            args: "--target universal-apple-darwin"
          # Linux x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          # Windows x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Для universal macOS нужны обе цели
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ---------------------------------------------------------------
      # Системные зависимости (только Linux)
      # ---------------------------------------------------------------
      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            cmake

      # ===============================================================
      # whisper-cli под каждую ОС
      # ===============================================================

      # --- Linux: собираем из исходников ---
      - name: Build whisper-cli (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DWHISPER_BUILD_EXAMPLES=ON
          cmake --build build -j$(nproc) --config Release
          mkdir -p ../src-tauri/whisher
          cp build/bin/whisper-cli ../src-tauri/whisher/whisper-cli
          # Сопутствующие shared-библиотеки
          find build -name "*.so*" -exec cp {} ../src-tauri/whisher/ \;
          chmod +x ../src-tauri/whisher/whisper-cli
          cd ..
          rm -rf whisper.cpp

      # --- macOS: собираем universal (arm64 + x86_64) из исходников ---
      - name: Build whisper-cli (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DWHISPER_BUILD_EXAMPLES=ON \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          cmake --build build -j$(sysctl -n hw.ncpu) --config Release
          mkdir -p ../src-tauri/whisher
          cp build/bin/whisper-cli ../src-tauri/whisher/whisper-cli
          find build -name "*.dylib" -exec cp {} ../src-tauri/whisher/ \;
          chmod +x ../src-tauri/whisher/whisper-cli
          cd ..
          rm -rf whisper.cpp

      # --- Windows: качаем готовый релиз ---
      - name: Download whisper-cli (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path src-tauri/whisher -Force | Out-Null
          # Берём последний релиз whisper.cpp с готовым бинарником под Windows x64
          $headers = @{ "User-Agent" = "stt-app-ci" }
          $rel = Invoke-RestMethod -Uri "https://api.github.com/repos/ggml-org/whisper.cpp/releases/latest" -Headers $headers
          $asset = $rel.assets | Where-Object { $_.name -match "bin-x64.*\.zip$" } | Select-Object -First 1
          if (-not $asset) {
            $asset = $rel.assets | Where-Object { $_.name -match "win.*x64.*\.zip$" } | Select-Object -First 1
          }
          if (-not $asset) { throw "Не найден Windows x64 zip в релизе whisper.cpp" }
          Write-Host "Скачиваю $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile whisper-win.zip -Headers $headers
          Expand-Archive -Path whisper-win.zip -DestinationPath whisper-win -Force
          # Бинарник и DLL могут лежать в корне или в подпапке (Release/)
          $cli = Get-ChildItem -Path whisper-win -Recurse -Filter "whisper-cli.exe" | Select-Object -First 1
          if (-not $cli) { throw "whisper-cli.exe не найден в архиве" }
          Copy-Item $cli.FullName src-tauri/whisher/whisper-cli.exe -Force
          Get-ChildItem -Path $cli.Directory -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName src-tauri/whisher/ -Force
          }
          Remove-Item -Recurse -Force whisper-win, whisper-win.zip -ErrorAction SilentlyContinue
          Write-Host "Содержимое whisher:"; Get-ChildItem src-tauri/whisher

      # ===============================================================
      # ffmpeg под каждую ОС (для шумоподавления)
      # ===============================================================

      - name: Download ffmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          curl -L "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
          cp ffmpeg-*-amd64-static/ffmpeg src-tauri/whisher/ffmpeg
          chmod +x src-tauri/whisher/ffmpeg
          rm -rf ffmpeg-*-amd64-static ffmpeg.tar.xz

      - name: Download ffmpeg (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          # Статические сборки под обе арки + склейка через lipo
          curl -L "https://www.osxexperts.net/ffmpeg7arm.zip" -o ffmpeg-arm.zip || true
          curl -L "https://www.osxexperts.net/ffmpeg7intel.zip" -o ffmpeg-intel.zip || true
          mkdir -p ffm
          if [ -f ffmpeg-arm.zip ] && [ -f ffmpeg-intel.zip ]; then
            unzip -o ffmpeg-arm.zip -d ffm/arm
            unzip -o ffmpeg-intel.zip -d ffm/intel
            lipo -create ffm/arm/ffmpeg ffm/intel/ffmpeg -output src-tauri/whisher/ffmpeg
          else
            # Fallback: ставим через brew (арка раннера) — лучше, чем ничего
            brew install ffmpeg
            cp "$(which ffmpeg)" src-tauri/whisher/ffmpeg
          fi
          chmod +x src-tauri/whisher/ffmpeg
          rm -rf ffm ffmpeg-arm.zip ffmpeg-intel.zip

      - name: Download ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $headers = @{ "User-Agent" = "stt-app-ci" }
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip -Headers $headers
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-win -Force
          $exe = Get-ChildItem -Path ffmpeg-win -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $exe.FullName src-tauri/whisher/ffmpeg.exe -Force
          Remove-Item -Recurse -Force ffmpeg-win, ffmpeg.zip -ErrorAction SilentlyContinue

      # ===============================================================
      # Добавляем ffmpeg и нативные библиотеки в resources tauri.conf.json
      # (на каждой платформе свой набор файлов; делаем это в CI, чтобы не
      #  держать плейсхолдеры в репозитории и не ломать локальный cargo check)
      # ===============================================================

      - name: Patch tauri.conf resources (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: |
          cd src-tauri
          tmp=$(mktemp)
          jq '.bundle.resources = ["whisher/whisper-cli*","whisher/*.dll","whisher/*.so*","whisher/*.dylib","whisher/ffmpeg*"]' tauri.conf.json > "$tmp"
          mv "$tmp" tauri.conf.json
          echo "Обновлённые resources:"; jq '.bundle.resources' tauri.conf.json

      - name: Patch tauri.conf resources (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $cfgPath = "src-tauri/tauri.conf.json"
          $cfg = Get-Content $cfgPath -Raw | ConvertFrom-Json
          $cfg.bundle.resources = @("whisher/whisper-cli*","whisher/*.dll","whisher/ffmpeg*")
          $cfg | ConvertTo-Json -Depth 32 | Set-Content $cfgPath -Encoding UTF8
          Write-Host "Обновлённые resources:"; $cfg.bundle.resources

      # ===============================================================
      # Сборка приложения + релиз
      # ===============================================================

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Создаём/обновляем релиз только при пуше тега v*
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('STT App {0}', github.ref_name) || '' }}
          releaseBody: "Автоматическая сборка для Windows, macOS и Linux."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
